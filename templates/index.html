<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie & Series Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1 class="title" data-testid="app-title">AI Movie & Series Recommender</h1>
            <p class="subtitle" data-testid="app-subtitle">Powered by Naive Bayes Algorithm</p>
            <p class="description" data-testid="app-description">Tell us your preferences and we'll recommend the perfect content for you</p>
        </header>

        <!-- Recommendation Form -->
        <div class="form-card" data-testid="recommendation-form-card">
            <h2 class="form-title">What are you in the mood for?</h2>
            <form id="recommendForm" data-testid="recommendation-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="genre" data-testid="genre-label">Genre</label>
                        <select id="genre" name="genre" required data-testid="genre-select">
                            <option value="" data-testid="genre-placeholder">Select Genre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mood" data-testid="mood-label">Mood</label>
                        <select id="mood" name="mood" required data-testid="mood-select">
                            <option value="" data-testid="mood-placeholder">Select Mood</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="duration" data-testid="duration-label">Duration</label>
                        <select id="duration" name="duration" required data-testid="duration-select">
                            <option value="" data-testid="duration-placeholder">Select Duration</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="content_type" data-testid="content-type-label">Content Type</label>
                        <select id="content_type" name="content_type" required data-testid="content-type-select">
                            <option value="" data-testid="content-type-placeholder">Select Type</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="language" data-testid="language-label">Language</label>
                        <select id="language" name="language" required data-testid="language-select">
                            <option value="" data-testid="language-placeholder">Select Language</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-recommend" data-testid="recommend-button">
                    <span class="btn-text">Get Recommendations</span>
                </button>
            </form>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading hidden" data-testid="loading-indicator">
            <div class="spinner"></div>
            <p>Finding perfect matches...</p>
        </div>

        <!-- Results Section -->
        <div id="results" class="results hidden" data-testid="results-section">
            <!-- Top Recommendation -->
            <div class="top-recommendation" data-testid="top-recommendation">
                <div class="badge" data-testid="top-match-badge">🎬 Top Match</div>
                <h2 class="rec-title" id="topTitle" data-testid="top-recommendation-title"></h2>
                <div class="confidence" id="topConfidence" data-testid="top-recommendation-confidence"></div>
                <div class="explanation" id="topExplanation" data-testid="top-recommendation-explanation"></div>
                <div class="details" id="topDetails" data-testid="top-recommendation-details"></div>
            </div>

            <!-- Alternative Recommendations -->
            <div class="alternatives-section">
                <h3 class="alternatives-title" data-testid="alternatives-title">More Recommendations</h3>
                <div class="alternatives-grid" id="alternativesGrid" data-testid="alternatives-grid">
                    <!-- Alternative cards will be inserted here -->
                </div>
            </div>

            <!-- Reset Button -->
            <button id="resetBtn" class="btn-reset" data-testid="reset-button">Try Again</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
